<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Your Shop — KSN</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="brand">KRYSTAL<span>SUPPLY</span></a>
    <div><a href="login.html">Login</a></div>
  </nav>

  <div class="form-wrap">
    <h1>Register your shop</h1>
    <p class="lede">Takes about a minute. You'll get your shop code right after.</p>

    <form id="registerForm">
      <label for="shopName">Shop name</label>
      <input type="text" id="shopName" required />

      <label for="ownerName">Owner name</label>
      <input type="text" id="ownerName" required />

      <label for="phone">Phone number</label>
      <input type="tel" id="phone" placeholder="07XX XXX XXX" required />

      <label for="location">Location</label>
      <input type="text" id="location" placeholder="e.g. Manyatta, Embu" required />

      <label for="email">Email</label>
      <input type="email" id="email" required />

      <label for="password">Password</label>
      <input type="password" id="password" minlength="6" required />

      <button type="submit" class="submit">Create shop account</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="form-footer">Already registered? <a href="login.html">Log in</a></div>
  </div>

  <script type="module">
    import { registerShop } from "./js/auth.js";

    const form = document.getElementById("registerForm");
    const errorMsg = document.getElementById("errorMsg");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.style.display = "none";

      const submitBtn = form.querySelector("button");
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating account…";

      try {
        const { shopCode } = await registerShop({
          shopName: document.getElementById("shopName").value.trim(),
          ownerName: document.getElementById("ownerName").value.trim(),
          phone: document.getElementById("phone").value.trim(),
          location: document.getElementById("location").value.trim(),
          email: document.getElementById("email").value.trim(),
          password: document.getElementById("password").value
        });

        alert(`Shop registered! Your shop code is ${shopCode}`);
        window.location.href = "dashboard.html";
      } catch (err) {
        errorMsg.textContent = err.message.replace("Firebase: ", "");
        errorMsg.style.display = "block";
        submitBtn.disabled = false;
        submitBtn.textContent = "Create shop account";
      }
    });
  </script>
</body>
</html>
