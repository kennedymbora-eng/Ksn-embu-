<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — KSN</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="dash-header">
    <div>
      <div class="brand" style="font-size:1.05rem;">KRYSTAL<span style="color:#F5F3EE">SUPPLY</span></div>
      <div class="dash-shop" id="shopLabel">Loading…</div>
    </div>
    <a href="#" id="logoutBtn" class="btn btn-ghost" style="padding:8px 16px;">Log out</a>
  </div>

  <div class="dash-body">
    <div class="stat-row">
      <div class="stat"><div class="label">Total products</div><div class="value" id="statTotal">0</div></div>
      <div class="stat low"><div class="label">Low stock</div><div class="value" id="statLow">0</div></div>
      <div class="stat out"><div class="label">Out of stock</div><div class="value" id="statOut">0</div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Inventory</h2>
      </div>
      <div class="add-form">
        <input type="text" id="pName" placeholder="Product name" />
        <input type="text" id="pCategory" placeholder="Category" />
        <input type="number" id="pStock" placeholder="Current stock" />
        <input type="number" id="pMinStock" placeholder="Minimum stock" />
        <button class="btn-sm amber" id="addProductBtn" style="grid-column: span 4;">+ Add product</button>
      </div>
      <table>
        <thead>
          <tr><th>Product</th><th>Category</th><th>Stock</th><th>Status</th><th></th></tr>
        </thead>
        <tbody id="inventoryBody">
          <tr><td colspan="5" class="empty-state">No products yet — add your first one above.</td></tr>
        </tbody>
      </table>
    </div>

    <div class="panel">
      <div class="panel-head">
        <h2>Restock list</h2>
        <button class="btn-sm amber" id="submitOrderBtn">Submit order</button>
      </div>
      <table>
        <thead><tr><th>Product</th><th>Quantity</th><th></th></tr></thead>
        <tbody id="restockBody">
          <tr><td colspan="3" class="empty-state">Nothing added yet. Add low-stock items from the inventory table above.</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { watchAuthState, logout } from "./js/auth.js";
    import {
      addProduct, updateStock, deleteProduct, watchInventory, stockStatus,
      addToRestockList, removeFromRestockList, watchRestockList, submitRestockOrder
    } from "./js/inventory.js";
    import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { db } from "./js/firebase-config.js";

    let currentShopId = null;
    let currentProducts = [];

    watchAuthState(
      async (user) => {
        currentShopId = user.uid;
        const shopSnap = await getDoc(doc(db, "shops", currentShopId));
        const shop = shopSnap.data();
        document.getElementById("shopLabel").textContent = shop
          ? `${shop.shopName} · ${shop.shopCode}`
          : user.email;

        watchInventory(currentShopId, renderInventory);
        watchRestockList(currentShopId, renderRestockList);
      },
      () => { window.location.href = "login.html"; }
    );

    document.getElementById("logoutBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      await logout();
      window.location.href = "login.html";
    });

    function renderInventory(products) {
      currentProducts = products;
      const body = document.getElementById("inventoryBody");

      const low = products.filter(p => stockStatus(p.stock, p.minStock) === "low").length;
      const out = products.filter(p => stockStatus(p.stock, p.minStock) === "out").length;
      document.getElementById("statTotal").textContent = products.length;
      document.getElementById("statLow").textContent = low;
      document.getElementById("statOut").textContent = out;

      if (products.length === 0) {
        body.innerHTML = `<tr><td colspan="5" class="empty-state">No products yet — add your first one above.</td></tr>`;
        return;
      }

      body.innerHTML = products.map(p => {
        const status = stockStatus(p.stock, p.minStock);
        const pillClass = status === "out" ? "out" : status === "low" ? "low" : "ok";
        const pillText = status === "out" ? "Out of stock" : status === "low" ? "Low stock" : "In stock";
        return `
          <tr>
            <td>${escapeHtml(p.name)}</td>
            <td>${escapeHtml(p.category || "—")}</td>
            <td>${p.stock}</td>
            <td><span class="pill ${pillClass}">${pillText}</span></td>
            <td>
              <button class="btn-sm" data-restock="${p.id}">+ Restock list</button>
              <button class="btn-sm" data-delete="${p.id}">Delete</button>
            </td>
          </tr>
        `;
      }).join("");

      body.querySelectorAll("[data-restock]").forEach(btn => {
        btn.addEventListener("click", () => {
          const product = currentProducts.find(p => p.id === btn.dataset.restock);
          const qty = prompt(`How many ${product.name} to restock?`, "10");
          if (qty) addToRestockList(currentShopId, product, qty);
        });
      });
      body.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", () => {
          if (confirm("Delete this product?")) deleteProduct(currentShopId, btn.dataset.delete);
        });
      });
    }

    function renderRestockList(items) {
      const body = document.getElementById("restockBody");
      if (items.length === 0) {
        body.innerHTML = `<tr><td colspan="3" class="empty-state">Nothing added yet. Add low-stock items from the inventory table above.</td></tr>`;
        return;
      }
      body.innerHTML = items.map(i => `
        <tr>
          <td>${escapeHtml(i.name)}</td>
          <td>${i.quantity}</td>
          <td><button class="btn-sm" data-remove="${i.id}">Remove</button></td>
        </tr>
      `).join("");
      body.querySelectorAll("[data-remove]").forEach(btn => {
        btn.addEventListener("click", () => removeFromRestockList(currentShopId, btn.dataset.remove));
      });
      window.__restockItems = items;
    }

    document.getElementById("addProductBtn").addEventListener("click", async () => {
      const name = document.getElementById("pName").value.trim();
      const category = document.getElementById("pCategory").value.trim();
      const stock = document.getElementById("pStock").value;
      const minStock = document.getElementById("pMinStock").value;
      if (!name) return alert("Product name is required.");

      await addProduct(currentShopId, { name, category, stock, minStock });
      document.getElementById("pName").value = "";
      document.getElementById("pCategory").value = "";
      document.getElementById("pStock").value = "";
      document.getElementById("pMinStock").value = "";
    });

    document.getElementById("submitOrderBtn").addEventListener("click", async () => {
      const items = window.__restockItems || [];
      if (items.length === 0) return alert("Your restock list is empty.");
      if (!confirm(`Submit order for ${items.length} item(s)?`)) return;
      await submitRestockOrder(currentShopId, items);
      alert("Order submitted!");
    });

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str ?? "";
      return div.innerHTML;
    }
  </script>
</body>
</html>
